<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paulo Loboneto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #efefec;
    --text: #1a1a18;
    --text2: #5c5c58;
    --text3: #8a8a84;
    --border: rgba(0,0,0,0.1);
    --info-text: #185fa5;
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #242422;
      --bg3: #2e2e2b;
      --text: #e8e8e2;
      --text2: #a8a8a0;
      --text3: #6a6a62;
      --border: rgba(255,255,255,0.1);
      --info-text: #85b7eb;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem 1.5rem 4rem;
    max-width: 720px;
    margin: 0 auto;
    line-height: 1.6;
  }

  header {
    margin-bottom: 3rem;
    padding-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--border);
  }
  header h1 {
    font-family: 'Lora', serif;
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 0.4rem;
  }
  header p {
    font-size: 14px;
    color: var(--text3);
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 1rem;
  }

  .article-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  /* ── To add a new article: copy one <a class="article-card"> block ── */
  .article-card {
    display: block;
    padding: 1rem 1.25rem;
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    text-decoration: none;
    color: inherit;
    transition: background 0.15s;
  }
  .article-card:hover { background: var(--bg2); }

  .article-card .title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 0.25rem;
  }
  .article-card .desc {
    font-size: 13px;
    color: var(--text3);
    margin-bottom: 0.5rem;
  }
  .article-card .meta {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .article-card .tag {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--bg2);
    color: var(--text3);
    border: 0.5px solid var(--border);
  }
  .article-card .date {
    font-size: 11px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <h1>Paulo Loboneto</h1>
  <p>Artigos e widgets interativos sobre engenharia de software</p>
</header>

<div class="section-label">Artigos</div>

<div class="article-list">

  <!-- ── ADICIONAR NOVO ARTIGO: copie o bloco abaixo e ajuste href, title, desc, tag e date ── -->

  <a class="article-card" href="articles/virtual-dom-react.html">
    <div class="title">React: Virtual DOM e Reconciliação</div>
    <div class="meta">
      <span class="tag">React</span>
      <span class="tag">Performance</span>
      <span class="date">2025</span>
    </div>
  </a>

</div>

</body>
</html>
